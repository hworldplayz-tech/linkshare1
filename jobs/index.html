<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPulse – Find Your Next Opportunity | LinkShare</title>
  <meta name="description" content="Browse government and private job listings on JobPulse. Filter by type, city and search for your next career opportunity.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/jobs/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="/js/nav-loader.js"></script>
</head>
<body>

  <!-- FILTERS -->
  <section class="filters-section">
    <div class="filters-inner">
      <div class="filters-row">
        <span class="filter-label">Filter:</span>
        <div class="custom-select-wrap">
          <select id="filterGov" class="gov-select">
            <option value="">🏛️ Government Jobs</option>
          </select>
        </div>
        <div class="custom-select-wrap">
          <select id="filterPrivate" class="private-select">
            <option value="">🏢 Private Jobs</option>
          </select>
        </div>
        <div class="custom-select-wrap">
          <select id="filterCity">
            <option value="">📍 All Cities</option>
          </select>
        </div>
      </div>
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon"><i class="fas fa-search"></i></span>
          <input type="text" id="searchInput" placeholder="Search by title, category, city…">
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="btnGrid" title="Grid view"><i class="fas fa-th"></i></button>
          <button class="view-btn" id="btnList" title="List view"><i class="fas fa-list"></i></button>
        </div>
      </div>
    </div>
  </section>

  <!-- MAIN -->
  <main class="main-content">
    <div class="results-bar">
      <div class="results-count">Showing <strong id="resultsCount">0</strong> jobs</div>
      <div class="active-filters" id="activeFilters"></div>
    </div>
    <div id="jobsContainer" class="jobs-grid">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading jobs…</p>
      </div>
    </div>
  </main>

  <!-- DETAIL MODAL -->
  <div class="job-modal-overlay" id="jobModal" onclick="handleModalOverlayClick(event)" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="job-modal-card">
      <button class="modal-close" onclick="closeModal()" aria-label="Close"><i class="fas fa-times"></i></button>
      <div id="modalImageWrap" class="modal-image-wrap"></div>
      <div class="modal-body">
        <div id="modalTags" class="modal-tags"></div>
        <h2 id="modalTitle" class="modal-title"></h2>
        <div id="modalDeadline" class="modal-deadline-row"></div>
        <div id="modalDesc" class="modal-desc"></div>
        <div id="modalApply" class="modal-apply-row"></div>
      </div>
    </div>
  </div>

  <script src="/js/footer-loader.js"></script>
  <script type="module" src="/jobs/script.js"></script>
</body>
</html>
