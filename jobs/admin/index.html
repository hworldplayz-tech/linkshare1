<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPulse Admin – Manage Jobs</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/jobs/" class="logo">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <span>Job<strong>Pulse</strong></span>
      </a>
      <div class="header-actions">
        <a href="/jobs/" class="btn-admin" style="background:#64748b"><i class="fas fa-arrow-left"></i> View Jobs</a>
      </div>
    </div>
  </header>

  <!-- ADMIN CONTENT -->
  <div class="admin-wrap">

    <div class="admin-header-bar">
      <h1><i class="fas fa-cog" style="color:var(--primary)"></i> Admin Panel</h1>
      <div style="display:flex;align-items:center;gap:0.75rem;font-size:0.85rem;color:var(--text-muted)">
        <span id="totalCount">0 jobs total</span>
      </div>
    </div>

    <div class="admin-layout">

      <!-- FORM PANEL -->
      <div class="form-panel">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Add New Job</h2>

        <form id="jobForm" novalidate>
          <input type="hidden" id="editId">

          <div class="form-group">
            <label>Job Title</label>
            <input type="text" id="fTitle" placeholder="e.g. Software Engineer at PTCL">
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="fDesc" placeholder="Brief description of the role, requirements, etc."></textarea>
          </div>

          <div class="form-group">
            <label>Category / Tag</label>
            <input type="text" id="fCategory" placeholder="e.g. IT, Finance, Teaching, Sales…">
          </div>

          <div class="checkbox-row">
            <label class="checkbox-label cb-gov">
              <input type="checkbox" id="fIsGov">
              🏛️ Government Job
            </label>
            <label class="checkbox-label cb-private">
              <input type="checkbox" id="fIsPrivate">
              🏢 Private Job
            </label>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" id="fCity" placeholder="e.g. Karachi, Lahore…">
            </div>
            <div class="form-group">
              <label>Deadline</label>
              <input type="date" id="fDeadline">
            </div>
          </div>

          <div class="form-group">
            <label>Apply Link (URL)</label>
            <input type="url" id="fApplyLink" placeholder="https://company.com/apply">
          </div>

          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="fImageUrl" placeholder="https://…/image.jpg" oninput="previewImageFromUrl(this.value)">
          </div>

          <div class="form-group">
            <label>— Or upload image file —</label>
            <input type="file" id="fImageFile" accept="image/*" style="font-size:0.85rem;">
            <div class="image-preview-wrap">
              <img id="imagePreview" class="image-preview" alt="Preview">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-save" id="saveBtn">
              <i class="fas fa-save"></i> Save Job
            </button>
            <button type="button" class="btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none">
              Cancel
            </button>
          </div>
        </form>
      </div>

      <!-- LIST PANEL -->
      <div class="list-panel">
        <div class="list-panel-header">
          <h2>All Jobs</h2>
          <span class="jobs-count-badge" id="jobsBadge">0</span>
        </div>

        <div id="adminJobsList"></div>
      </div>

    </div>
  </div>

  <footer class="site-footer">
    <p>JobPulse Admin Panel &nbsp;·&nbsp; <a href="/jobs/">Back to listings</a></p>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
