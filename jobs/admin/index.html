<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPulse Admin – Manage Jobs | LinkShare</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/jobs/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="/js/nav-loader.js"></script>
</head>
<body>

  <!-- LOGIN OVERLAY (shown until authenticated) -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon"><i class="fas fa-lock"></i></div>
        <h2>Admin Login</h2>
        <p>Sign in to manage job listings</p>
      </div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <div id="loginError" class="login-error"></div>
        <button type="submit" class="btn-save" id="loginBtn" style="width:100%">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- ADMIN CONTENT -->
  <div class="admin-wrap">

    <div class="admin-header-bar">
      <h1>
        <i class="fas fa-cog" style="color:var(--primary)"></i> Admin Panel
        <a href="/jobs/" style="font-size:0.85rem;font-weight:600;color:var(--text-muted);margin-left:1rem;text-decoration:none;">
          <i class="fas fa-arrow-left"></i> View Jobs
        </a>
      </h1>
      <div style="display:flex;align-items:center;gap:0.75rem;font-size:0.85rem;color:var(--text-muted)">
        <span id="totalCount">0 jobs total</span>
        <span id="adminUserEmail" style="font-weight:600;color:var(--primary-dark)"></span>
        <button id="signOutBtn" style="background:transparent;border:1.5px solid var(--border);color:var(--text-muted);padding:0.3rem 0.7rem;border-radius:6px;cursor:pointer;font-size:0.82rem;">
          <i class="fas fa-sign-out-alt"></i> Sign Out
        </button>
      </div>
    </div>

    <div class="admin-layout">

      <!-- FORM PANEL -->
      <div class="form-panel">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Add New Job</h2>

        <form id="jobForm" novalidate>
          <input type="hidden" id="editId">

          <div class="form-group">
            <label>Job Title</label>
            <input type="text" id="fTitle" placeholder="e.g. Software Engineer at PTCL">
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="fDesc" placeholder="Brief description of the role, requirements, etc."></textarea>
          </div>

          <div class="form-group">
            <label>Category / Tag</label>
            <input type="text" id="fCategory" placeholder="e.g. IT, Finance, Teaching, Sales…">
          </div>

          <div class="checkbox-row">
            <label class="checkbox-label cb-gov">
              <input type="checkbox" id="fIsGov"> 🏛️ Government Job
            </label>
            <label class="checkbox-label cb-private">
              <input type="checkbox" id="fIsPrivate"> 🏢 Private Job
            </label>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" id="fCity" placeholder="e.g. Karachi, Lahore…">
            </div>
            <div class="form-group">
              <label>Deadline</label>
              <input type="date" id="fDeadline">
            </div>
          </div>

          <div class="form-group">
            <label>Apply Link (URL)</label>
            <input type="url" id="fApplyLink" placeholder="https://company.com/apply">
          </div>

          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="fImageUrl" placeholder="https://…/image.jpg" oninput="previewImageFromUrl(this.value)">
          </div>

          <div class="form-group">
            <label>— Or upload image file —</label>
            <input type="file" id="fImageFile" accept="image/*" style="font-size:0.85rem;">
            <div class="image-preview-wrap">
              <img id="imagePreview" class="image-preview" alt="Preview">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-save" id="saveBtn">
              <i class="fas fa-save"></i> Save Job
            </button>
            <button type="button" class="btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none">
              Cancel
            </button>
          </div>
        </form>
      </div>

      <!-- LIST PANEL -->
      <div class="list-panel">
        <div class="list-panel-header">
          <h2>All Jobs</h2>
          <span class="jobs-count-badge" id="jobsBadge">0</span>
        </div>
        <div id="adminJobsList">
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>No jobs yet</h3>
            <p>Add your first job using the form on the left.</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Footer loader with absolute path (admin is nested deeper) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('/footer.html').then(r => r.text()).then(html => {
        document.body.insertAdjacentHTML('beforeend', html);
        const y = document.getElementById('currentYear');
        if (y) y.textContent = new Date().getFullYear();
        const btn = document.querySelector('.scroll-to-top');
        if (btn) {
          window.addEventListener('scroll', () => btn.classList.toggle('visible', window.pageYOffset > 300));
          btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
      }).catch(() => {});
    });
  </script>

  <script type="module" src="/jobs/admin/admin.js"></script>
</body>
</html>
